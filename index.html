<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子·幻境 v0.1</title>
    <style>
        body { margin:0; overflow:hidden; background:#030514; font-family:sans-serif; color:#fff; user-select:none; }
        canvas { display:block; }
        #ui-layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; display:flex; flex-direction:column; justify-content:space-between; }
        .header { padding:20px; }
        .title { font-size:24px; font-weight:300; letter-spacing:2px; text-shadow:0 0 10px rgba(0,245,255,0.8); margin:0; }
        .subtitle { font-size:11px; color:#00f5ff; opacity:0.7; margin-top:5px; }
        #status { position:absolute; top:20px; right:20px; font-size:12px; color:#00f5ff; background:rgba(0,245,255,0.15); padding:6px 12px; border-radius:20px; border:1px solid rgba(0,245,255,0.3); backdrop-filter:blur(5px); }
        .bottom-bar { padding:20px; display:flex; justify-content:center; gap:10px; pointer-events:auto; flex-wrap:wrap; }
        button { background:rgba(0,245,255,0.05); border:1px solid rgba(0,245,255,0.4); color:#00f5ff; padding:8px 16px; font-size:13px; border-radius:20px; cursor:pointer; transition:all 0.3s; }
        button:hover, button.active { background:rgba(0,245,255,0.25); box-shadow:0 0 10px rgba(0,245,255,0.5); }
        #video-input { position:absolute; bottom:20px; left:20px; width:80px; height:60px; border:1px solid #00f5ff; transform:scaleX(-1); border-radius:4px; opacity:0.3; pointer-events:none; }
    </style>
    <script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
</head>
<body>
    <div id="ui-layer">
        <div class="header"><h1 class="title">粒子·幻境 v0.1</h1><div class="subtitle">移动端手势优化版</div></div>
        <div id="status">正在请求前置相机...</div>
        <div class="bottom-bar">
            <button id="btn-nebula" class="active">扩散星云</button>
            <button id="btn-heart">轨迹心</button>
            <button id="btn-rings">全部环</button>
            <button id="btn-restart">打散重组</button>
        </div>
    </div>
    <video id="video-input" autoplay playsinline></video>
    <script type="module">
        import * as THREE from 'three';

        const PARTICLE_COUNT = 10000;
        const scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0x030514, 0.001);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000); camera.position.z = 800;
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); document.body.appendChild(renderer.domElement);

        function getTexture() {
            const c = document.createElement('canvas'); c.width = 64; c.height = 64;
            const ctx = c.getContext('2d'), g = ctx.createRadialGradient(32,32,0,32,32,32);
            g.addColorStop(0, '#fff'); g.addColorStop(0.2, 'rgba(0,245,255,0.8)'); g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g; ctx.fillRect(0,0,64,64); return new THREE.CanvasTexture(c);
        }

        const geometry = new THREE.BufferGeometry(), positions = new Float32Array(PARTICLE_COUNT * 3), targetPositions = new Float32Array(PARTICLE_COUNT * 3), sizes = new Float32Array(PARTICLE_COUNT);
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            positions[i*3] = (Math.random()-0.5)*100; positions[i*3+1] = (Math.random()-0.5)*100; positions[i*3+2] = (Math.random()-0.5)*100; sizes[i] = Math.random()*6+3;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3)); geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        
        const material = new THREE.ShaderMaterial({
            uniforms: { color: { value: new THREE.Color(0x00f5ff) }, tex: { value: getTexture() } },
            vertexShader: `attribute float size; void main() { vec4 mv = modelViewMatrix * vec4(position, 1.0); gl_PointSize = size * (800.0 / -mv.z); gl_Position = projectionMatrix * mv; }`,
            fragmentShader: `uniform vec3 color; uniform sampler2D tex; void main() { gl_FragColor = vec4(color, 1.0) * texture2D(tex, gl_PointCoord); }`,
            blending: THREE.AdditiveBlending, depthTest: false, transparent: true
        });
        const particleSystem = new THREE.Points(geometry, material); scene.add(particleSystem);

        let mode = 'nebula';
        function updateShape() {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                if (mode === 'nebula') {
                    let r = Math.random()*550, t = Math.random()*Math.PI*2;
                    targetPositions[i*3]=Math.cos(t)*r; targetPositions[i*3+1]=(Math.random()-0.5)*(120-r*0.15); targetPositions[i*3+2]=Math.sin(t)*r;
                } else if (mode === 'heart') {
                    let t = Math.random()*Math.PI*2, r = Math.random()*4+12;
                    targetPositions[i*3]=(16*Math.pow(Math.sin(t),3))*16+(Math.random()-0.5)*r; targetPositions[i*3+1]=(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*16+(Math.random()-0.5)*r; targetPositions[i*3+2]=(Math.random()-0.5)*20;
                } else if (mode === 'rings') {
                    let r = 140+(i%4)*90, t = Math.random()*Math.PI*2;
                    targetPositions[i*3]=Math.cos(t)*r+(Math.random()-0.5)*15; targetPositions[i*3+1]=Math.sin(t)*r*Math.sin(t)*0.4; targetPositions[i*3+2]=Math.sin(t)*r+(Math.random()-0.5)*15;
                }
            }
        }
        updateShape();

        const btns = ['nebula','heart','rings'].map(id => document.getElementById('btn-'+id));
        btns.forEach((btn, idx) => btn.onclick = () => { mode = ['nebula','heart','rings'][idx]; btns.forEach(b => b.className=''); btn.className='active'; updateShape(); });
        document.getElementById('btn-restart').onclick = () => { for(let i=0;i<PARTICLE_COUNT*3;i++) positions[i]=(Math.random()-0.5)*1500; updateShape(); };
        let handState = 'none', handCenter = new THREE.Vector3(), indexTipPos = new THREE.Vector3();
        const statEl = document.getElementById('status'), vid = document.getElementById('video-input');

        // 使用全球高可用标准节点
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        const map3D = (l) => new THREE.Vector3(-(l.x-0.5)*1200, -(l.y-0.5)*900, -l.z*1000);

        let modelReady = false;
        hands.onResults((res) => {
            modelReady = true; 
            if (res.multiHandLandmarks?.length > 0) {
                statEl.innerText = "手势已捕获 (互动中)"; statEl.style.color = "#00ff88"; statEl.style.borderColor = "#00ff88";
                const lm = res.multiHandLandmarks[0];
                const wrist=map3D(lm[0]), thumb=map3D(lm[4]), index=map3D(lm[8]), mid=map3D(lm[12]), pinky=map3D(lm[20]);
                handCenter.copy(wrist).add(mid).multiplyScalar(0.5); indexTipPos.copy(index);
                
                const closed = mid.distanceTo(wrist)<160 && pinky.distanceTo(wrist)<160;
                if (thumb.distanceTo(index)<75 && closed) handState = 'pinch';
                else if (index.distanceTo(wrist)>230 && closed) handState = 'point';
                else if (mid.distanceTo(wrist)>230 && pinky.distanceTo(wrist)>180) handState = 'open';
                else handState = 'hover';
            } else { statEl.innerText = "寻星中 (请将手推向镜头)"; statEl.style.color = "#00f5ff"; statEl.style.borderColor = "rgba(0,245,255,0.3)"; handState = 'none'; }
        });

        let isProcessing = false;
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 480 }, height: { ideal: 360 } }
                });
                vid.srcObject = stream;
                // 监听视频真正播放的瞬间，强行激活识别大脑
                vid.addEventListener('playing', () => {
                    statEl.innerText = "大脑唤醒中...";
                    function predictLoop() {
                        if (vid.readyState >= 2 && !isProcessing) {
                            isProcessing = true;
                            hands.send({image: vid}).then(() => { isProcessing = false; }).catch(() => { isProcessing = false; });
                        }
                        // 如果模型还没反应，页面强行提示
                        if(!modelReady && vid.currentTime > 2) { statEl.innerText = "正在突破网络连接..."; }
                        requestAnimationFrame(predictLoop);
                    }
                    predictLoop();
                });
                vid.play();
            } catch (err) { statEl.innerText = "相机受阻，请检查权限"; }
        }
        
        // 确保页面加载完成后再执行，防止手机端异步阻塞
        if (document.readyState === 'complete') { startCamera(); } else { window.addEventListener('load', startCamera); }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime(), posArr = geometry.attributes.position.array;
            
            if (handState === 'none' || handState === 'open') { particleSystem.rotation.y = time*0.08; particleSystem.rotation.z = time*0.03; }
            else { particleSystem.rotation.y *= 0.93; particleSystem.rotation.z *= 0.93; }

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let tx = targetPositions[i*3], ty = targetPositions[i*3+1], tz = targetPositions[i*3+2], spd = 0.03;
                if (handState === 'pinch') {
                    let r = Math.random()*35, t = Math.random()*6.28, p = Math.acos(Math.random()*2-1);
                    tx = handCenter.x+r*Math.sin(p)*Math.cos(t); ty = handCenter.y+r*Math.sin(p)*Math.sin(t); tz = handCenter.z+r*Math.cos(p); spd = 0.16;
                } else if (handState === 'open') {
                    let d = Math.sqrt((posArr[i*3]-handCenter.x)**2 + (posArr[i*3+1]-handCenter.y)**2 + (posArr[i*3+2]-handCenter.z)**2);
                    if (d < 260) { let f = (260-d)/260; tx = posArr[i*3]+(posArr[i*3]-handCenter.x)*f*2.5; ty = posArr[i*3+1]+(posArr[i*3+1]-handCenter.y)*f*2.5; tz = posArr[i*3+2]+(posArr[i*3+2]-handCenter.z)*f*2.5; spd = 0.12; }
                } else if (handState === 'point') {
                    let yo = (Math.random()-0.5)*350, r = Math.abs(yo)*0.4+20, a = time*6+yo*0.06+i*0.01;
                    tx = indexTipPos.x+Math.cos(a)*r; ty = indexTipPos.y+yo; tz = indexTipPos.z+Math.sin(a)*r; spd = 0.09;
                }
                tx += Math.sin(time+i)*1.5; ty += Math.cos(time+i*0.5)*1.5;
                posArr[i*3] += (tx-posArr[i*3])*spd; posArr[i*3+1] += (ty-posArr[i*3+1])*spd; posArr[i*3+2] += (tz-posArr[i*3+2])*spd;
            }
            geometry.attributes.position.needsUpdate = true; renderer.render(scene, camera);
        }
        animate();
        window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
